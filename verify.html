<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Verify Receipt · Mahavirpuram</title>
<link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;600;700&family=Rozha+One&display=swap" rel="stylesheet">
<style>
:root{--maroon:#6E1512;--red:#BE2A1E;--gold:#C49A35;--cream:#FBF4DE;--line:#E7D9BC;--green:#1f9d57}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:"Mukta",system-ui,sans-serif;background:radial-gradient(circle at 50% 0%,#7c1c14,#561010 80%);min-height:100vh;display:grid;place-items:center;padding:20px;color:#2c1b12}
.card{background:#FFFDF8;border-radius:22px;max-width:460px;width:100%;box-shadow:0 30px 70px rgba(0,0,0,.35);overflow:hidden}
.hd{background:var(--maroon);color:#fff;padding:22px;text-align:center}
.hd img{height:46px;background:#fff;border-radius:10px;padding:5px 8px;margin-bottom:8px}
.hd h1{font-family:"Rozha One",serif;font-weight:400;font-size:1.4rem}
.bd{padding:24px}
.badge{display:flex;align-items:center;gap:10px;background:#e7f3ec;border:1px solid #bfe3cd;color:var(--green);font-weight:700;border-radius:12px;padding:12px 14px;margin-bottom:16px}
.badge .tick{width:26px;height:26px;border-radius:50%;background:var(--green);color:#fff;display:grid;place-items:center;font-size:1rem}
table{width:100%;border-collapse:collapse;font-size:.92rem}
td{padding:8px 4px;border-bottom:1px solid var(--line)}td:first-child{color:#6E5C4D;width:42%}td:last-child{font-weight:600;text-align:right}
.note{font-size:.74rem;color:#6E5C4D;margin-top:16px;background:var(--cream);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
a.back{display:inline-block;margin-top:14px;color:var(--red);font-weight:600;font-size:.88rem}
</style></head><body>
<div class="card">
  <div class="hd"><img src="https://www.mahavirpuram.com/images/logo.png" alt="Mahavirpuram"><h1>Receipt Verification</h1></div>
  <div class="bd" id="out"></div>
</div>
<script>
var q=new URLSearchParams(location.search);
var r=q.get('r'),a=q.get('a'),d=q.get('d'),n=q.get('n');
var fmt=function(x){return '₹'+Number(x||0).toLocaleString('en-IN');};
var out=document.getElementById('out');
if(r){
 out.innerHTML='<div class="badge"><span class="tick">✓</span>Receipt found in record</div>'+
 '<table>'+
 '<tr><td>Receipt No.</td><td>'+r+'</td></tr>'+
 (n?'<tr><td>Donor</td><td>'+n+'</td></tr>':'')+
 (a?'<tr><td>Amount</td><td>'+fmt(a)+'</td></tr>':'')+
 (d?'<tr><td>Date</td><td>'+d+'</td></tr>':'')+
 '<tr><td>Issued by</td><td>Shree Mahavirpuram</td></tr>'+
 '</table>'+
 '<div class="note">Prototype verification: the details above are read from the QR code. For tamper-proof verification, connect this page to the trust’s receipt database so it confirms the record server-side.</div>';
}else{
 out.innerHTML='<div class="note">No receipt reference provided. Scan the QR code on a Mahavirpuram donation receipt to verify it here.</div>';
}
out.innerHTML+='<a class="back" href="index.html">← Back to Mahavirpuram</a>';
</script></body></html>
